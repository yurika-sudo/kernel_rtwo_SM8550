name: "Release (reusable)"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


on:
  workflow_call:
    inputs:
      zip_mode:   { type: string, required: true }   # per-variant | aio
      build_type: { type: string, required: true }   # stable | testing
      start_time: { type: string, required: true }
      workflow_type: { type: string, default: aio }

permissions:
  contents: write

jobs:
  release:
    name: "📦 Package & Release"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: "📥 Download all artifacts"
        uses: actions/download-artifact@v4.3.0
        with:
          path: ./artifacts/

      - name: "🔖 Resolve versions"
        run: bash scripts/resolve-versions.sh
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          WORKFLOW_TYPE: ${{ inputs.workflow_type }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}

      - name: "🗂️ Collect / bundle ZIPs"
        env:
          ZIP_MODE:   ${{ inputs.zip_mode }}
          BUILD_TYPE: ${{ inputs.build_type }}
        run: bash scripts/pack-release.sh

      - name: "📦 Fetch manager APKs"
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          KSUN_MANAGER_ARTIFACT_ID:  ${{ env.KSUN_MANAGER_ARTIFACT_ID }}
          SUKI_MANAGER_ARTIFACT_ID:  ${{ env.SUKI_MANAGER_ARTIFACT_ID }}
          KSUN_VERSION:              ${{ env.KSUN_VERSION }}
          SUKI_VERSION:              ${{ env.SUKI_VERSION }}
        run: bash scripts/fetch-manager-apks.sh

      - name: "📋 Build summary"
        env:
          BUILD_TYPE:      ${{ inputs.build_type }}
          ZIP_MODE:        ${{ inputs.zip_mode }}
          REPO:            ${{ github.repository }}
          SHA:             ${{ github.sha }}
          RUN_URL:         "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bash scripts/release-summary.sh

      - name: "📋 Audit logs"
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          BUILD_TYPE:  ${{ inputs.build_type }}
        run: bash scripts/audit-logs.sh

      - name: "📝 Release body"
        env:
          BUILD_TYPE:  ${{ inputs.build_type }}
          WORKFLOW_TYPE: ${{ inputs.workflow_type }}
          RUN_URL:     "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO:        ${{ github.repository }}
          SHA:         ${{ github.sha }}
          RUN_NUMBER:  ${{ github.run_number }}
        run: bash scripts/release-notes.sh

      - name: "🧹 Purge old AK3 assets"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$RELEASE_TAG" --json assets \
            -q '.assets[].name' 2>/dev/null \
            | grep '^AK3-' \
            | xargs -r -I{} gh release delete-asset \
                "$RELEASE_TAG" {} --yes 2>/dev/null || true        
        
      - name: "⬆️ Create release"
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          overwrite: true  
          files: |
            ./release_zips/*.zip
            ./manager_apks/*.apk
            ${{ env.LOG_AUDIT_ZIP }}
          tag_name:   ${{ env.RELEASE_TAG }}
          name:       ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.IS_PRERELEASE }}
          body:       ${{ env.RELEASE_BODY }}

      - name: "🎉 Telegram — success"
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_TYPE:    ${{ inputs.build_type }}
          ZIP_MODE:      ${{ inputs.zip_mode }}
          RUN_URL:       "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUN_NUMBER:    ${{ github.run_number }}
          SHA:           ${{ github.sha }}
          START_TIME:    ${{ inputs.start_time }}
          KERNEL_UNAME:  ${{ env.KERNEL_UNAME }}
        run: bash scripts/notify.sh success
