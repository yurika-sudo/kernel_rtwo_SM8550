name: "Build Kernel (reusable)"

on:
  workflow_call:
    inputs:
      variant_name:  { type: string, required: true }
      source_type:   { type: string, required: true }   # moto
      ksu_type:      { type: string, required: true }   # ksun | suki | none
      zip_prefix:    { type: string, required: true }
      artifact_name: { type: string, required: true }
      defconfig:     { type: string, required: true }
      clo_fragment:  { type: string, required: false }
      build_type:    { type: string, required: true }   # stable | testing

env:
  OUT_DIR: "out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: "${{ inputs.variant_name }}"
    runs-on: ubuntu-latest
    env:
      WORK_DIR:   ${{ github.workspace }}
      KERNEL_SRC: ${{ github.workspace }}/kernel_src

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: "🛠️ Setup env"
        uses: ./.github/actions/setup-env

      - name: "📌 Read Moto source pin"
        id: moto-pin
        run: |
          echo "hash=$(jq -r .moto_sublevel sources/source-pins.json)" >> $GITHUB_OUTPUT

      - name: "📦 Restore Moto source cache"
        id: moto-src-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.KERNEL_SRC }}
          key: moto-source-${{ steps.moto-pin.outputs.hash }}
          restore-keys: moto-source-

      - name: "🌟 Clone kernel source"
        env:
          SOURCE_TYPE:    ${{ inputs.source_type }}
          KSU_TYPE:       ${{ inputs.ksu_type }}
          MOTO_CACHE_HIT: ${{ steps.moto-src-cache.outputs.cache-hit }}
        run: bash scripts/clone-source.sh

      - name: "💾 Save Moto source cache"
        uses: actions/cache/save@v4
        with:
          path: ${{ env.KERNEL_SRC }}
          key: moto-source-${{ steps.moto-pin.outputs.hash }}

      - name: "🔧 Fix source warnings"
        if: inputs.ksu_type != 'none'
        run: bash scripts/fix-source-warnings.sh "${{ env.KERNEL_SRC }}"

      - name: "⚡ Configure ccache"
        if: inputs.build_type == 'stable'
        run: |
          sudo apt-get install -y ccache
          echo "CCACHE_DIR=$HOME/.ccache"                                                                          >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=1G"                                                                                 >> $GITHUB_ENV
          echo "CCACHE_COMPILERCHECK=content"                                                                      >> $GITHUB_ENV
          echo "CCACHE_DIRECT=true"                                                                                >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=true"                                                                             >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=${{ github.workspace }}"                                                            >> $GITHUB_ENV
          echo "CCACHE_IGNOREOPTIONS=--sysroot*"                                                                   >> $GITHUB_ENV
          echo "CCACHE_COMPRESSION=true"                                                                           >> $GITHUB_ENV
          echo "CCACHE_COMPRESSLEVEL=3"                                                                            >> $GITHUB_ENV
          echo "CCACHE_SLOPPINESS=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale" >> $GITHUB_ENV

      - name: "⚡ Restore ccache"
        if: inputs.build_type == 'stable'
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-${{ inputs.source_type }}-${{ inputs.ksu_type }}-${{ hashFiles('sources/source-pins.json') }}
          restore-keys: |
            ccache-${{ inputs.source_type }}-${{ inputs.ksu_type }}-

      - name: "🔧 Setup toolchain"
        run: bash scripts/setup-toolchain.sh

      - name: "🩹 Apply patches"
        if: inputs.ksu_type != 'none'
        env:
          SOURCE_TYPE: ${{ inputs.source_type }}
          KSU_TYPE:    ${{ inputs.ksu_type }}
          BUILD_TYPE:  ${{ inputs.build_type }}
          DEFCONFIG:   ${{ inputs.defconfig }}
        run: bash scripts/apply-patches.sh

      - name: "🛡️ Setup BBG"
        if: inputs.ksu_type == 'ksun'
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          git clone -q --depth=1 https://github.com/vc-teahouse/Baseband-guard.git
          ln -sf ../Baseband-guard security/baseband-guard
          grep -q "baseband-guard" security/Makefile || \
            echo 'obj-$(CONFIG_BBG) += baseband-guard/' >> security/Makefile
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' \
            security/Kconfig
          grep -q "baseband-guard/Kconfig" security/Kconfig || \
            sed -i '/source "security\/keys\/Kconfig"/a source "security/baseband-guard/Kconfig"' \
            security/Kconfig

      - name: "🔑 Setup KSU + SUSFS"
        if: inputs.ksu_type != 'none'
        uses: ./.github/actions/setup-ksu
        with:
          ksu_type:   ${{ inputs.ksu_type }}
          kernel_dir: ${{ env.KERNEL_SRC }}
          work_dir:   ${{ env.WORK_DIR }}

      - name: "🐳 Droidspaces"
        if: inputs.ksu_type != 'none'
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          bash ${{ github.workspace }}/scripts/droidspaces.sh \
            "arch/arm64/configs/${{ inputs.defconfig }}"

      - name: "⚙️ Kernel configs"
        uses: ./.github/actions/setup-configs
        with:
          ksu_type:    ${{ inputs.ksu_type }}
          source_type: ${{ inputs.source_type }}
          defconfig:   ${{ env.KERNEL_SRC }}/arch/arm64/configs/${{ inputs.defconfig }}
          kernel_dir:  ${{ env.KERNEL_SRC }}

      - name: "🏷️ Localversion"
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          sed -i "\$s|echo \"\\\$res\"|echo \"\\\$res-ab${SHORT_SHA}\"|" ./scripts/setlocalversion
          sed -i 's/-dirty//' ./scripts/setlocalversion
          KERNEL_TIMESTAMP=$(git log -1 --format=%ct)
          echo "KBUILD_BUILD_TIMESTAMP=$(date -u -d @${KERNEL_TIMESTAMP} +'%a %b %d %T UTC %Y')" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=${KERNEL_TIMESTAMP}" >> $GITHUB_ENV
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add . && git commit -m "clean dirty flag" || true

      - name: "🚀 Build kernel"
        id: build
        timeout-minutes: 50
        env:
          SOURCE_TYPE:  ${{ inputs.source_type }}
          KSU_TYPE:     ${{ inputs.ksu_type }}
          DEFCONFIG:    ${{ inputs.defconfig }}
          CLO_FRAGMENT: ${{ inputs.clo_fragment }}
          VARIANT:      ${{ inputs.variant_name }}
        run: bash scripts/build.sh

      - name: "⚡ Save ccache"
        if: inputs.build_type == 'stable' && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-${{ inputs.source_type }}-${{ inputs.ksu_type }}-${{ hashFiles('sources/source-pins.json') }}

      - name: "🔍 Verify kernel"
        run: bash scripts/verify-kernel.sh

      - name: "💉 KPM patch"
        if: inputs.ksu_type == 'suki'
        working-directory: ${{ env.WORK_DIR }}/out/dist
        run: |
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/refs/heads/main/kpm/patch_linux" \
            -o patch_linux
          chmod +x patch_linux && ./patch_linux
          rm -f Image && mv oImage Image

      - name: "📋 Build summary"
        if: always()
        env:
          VARIANT:     ${{ inputs.variant_name }}
          KSU_TYPE:    ${{ inputs.ksu_type }}
          SOURCE_TYPE: ${{ inputs.source_type }}
          BUILD_TYPE:  ${{ inputs.build_type }}
          RUN_URL:     "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: bash scripts/build-summary.sh

      - name: "📣 Notify variant failure"
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          VARIANT:     ${{ inputs.variant_name }}
          SOURCE_TYPE: ${{ inputs.source_type }}
          BUILD_TYPE:  ${{ inputs.build_type }}
          RUN_URL:     "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUN_NUMBER:  ${{ github.run_number }}
        run: bash scripts/notify.sh variant-failure

      - name: "📦 Pack ZIP"
        env:
          ZIP_PREFIX:  ${{ inputs.zip_prefix }}
          KSU_TYPE:    ${{ inputs.ksu_type }}
          BUILD_TYPE:  ${{ inputs.build_type }}
          SOURCE_TYPE: ${{ inputs.source_type }}
        run: bash scripts/pack-zip.sh

      - name: "🏷️ Capture uname"
        run: |
          UNAME=$(grep UTS_RELEASE \
            ${{ env.WORK_DIR }}/out/include/generated/utsrelease.h 2>/dev/null \
            | cut -d'"' -f2 || echo "unknown")
          echo "$UNAME" > ${{ env.WORK_DIR }}/out/dist/kernel_uname.txt
          echo "Kernel uname: $UNAME"

      - name: "📤 Upload artifact"
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ env.WORK_DIR }}/${{ env.ZIP_NAME }}
            ${{ env.WORK_DIR }}/out/dist/kernel_version.txt
            ${{ env.WORK_DIR }}/out/dist/kernel_uname.txt
            ${{ env.WORK_DIR }}/ksun_tag.txt
            ${{ env.WORK_DIR }}/suki_ksu_tag.txt
            ${{ env.WORK_DIR }}/ksun_version.txt
            ${{ env.WORK_DIR }}/suki_version.txt
          retention-days: 1
