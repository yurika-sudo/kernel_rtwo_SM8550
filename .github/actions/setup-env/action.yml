name: setup-env
description: install deps, record timestamps, copy apply_patch helper

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        echo "BUILD_TIME=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +'%Y%m%d')"          >> $GITHUB_ENV
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          aria2 bc bison build-essential flex \
          git libelf-dev libssl-dev curl jq \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          dwarves
        cp ${{ github.workspace }}/scripts/apply_patch.sh /tmp/apply_patch.sh
